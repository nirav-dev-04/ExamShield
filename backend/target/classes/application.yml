spring:
  application:
    name: examshield
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/examshield}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:ldrp@123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8085
  servlet:
    context-path: /

app:
  jwt:
    # 256-bit base64 secret: examshieldsecretkeymustbelongenoughandsecuretoavoidjwtsigningexceptions2026!
    secret: ZXhhbXNoaWVsZHNlY3JldGtleW11c3RiZWxvbmdlbm91Z2hhbmRzZWN1cmV0b2F2b2lkand0c2lnbmluZ2V4Y2VwdGlvbnMyMDI2IQ==
    accessTokenExpirationMs: 900000 # 15 minutes (15 * 60 * 1000)
    refreshTokenExpirationMs: 604800000 # 7 days (7 * 24 * 60 * 60 * 1000)
    cookieName: ES_ACCESS_TOKEN
    refreshCookieName: ES_REFRESH_TOKEN
  rate-limit:
    login:
      capacity: 5
      refill-tokens: 5
      refill-duration-seconds: 60
    answer-submit:
      capacity: 30
      refill-tokens: 30
      refill-duration-seconds: 60

logging:
  level:
    org.springframework.security: DEBUG
    org.flywaydb: INFO
    com.examshield: DEBUG
